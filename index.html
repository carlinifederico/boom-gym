<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>BOOM GYM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0f;
  --surface: #13131a;
  --surface2: #1a1a24;
  --surface3: #22222e;
  --accent: #6c5ce7;
  --accent2: #a29bfe;
  --accent-glow: rgba(108, 92, 231, 0.3);
  --green: #00b894;
  --green-glow: rgba(0, 184, 148, 0.3);
  --red: #e17055;
  --orange: #fdcb6e;
  --text: #f0f0f5;
  --text2: #a0a0b0;
  --text3: #606070;
  --radius: 14px;
  --radius-sm: 8px;
}
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body {
  font-family: 'Inter', -apple-system, sans-serif;
  background: var(--bg); color: var(--text);
  min-height: 100dvh; overflow-x: hidden;
  padding-bottom: 100px;
}

/* Header */
.header {
  position: sticky; top: 0; z-index: 100;
  background: rgba(10,10,15,0.85);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  padding: 10px 16px;
  border-bottom: 1px solid rgba(255,255,255,0.05);
  display: flex; align-items: center; justify-content: space-between;
}
.header-left h1 {
  font-size: 20px; font-weight: 900; letter-spacing: 3px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.header-left .header-sub { font-size: 9px; color: var(--text3); letter-spacing: 1px; }
.btn-header {
  width: 34px; height: 34px; display: flex; align-items: center; justify-content: center;
  background: var(--surface2); border: 1px solid rgba(255,255,255,0.06);
  border-radius: 10px; color: var(--text2); cursor: pointer; font-size: 15px;
}
.btn-header:active { transform: scale(0.9); }

/* Tabs */
.tabs-container { padding: 10px 14px 4px; }
.tabs { display: flex; gap: 6px; overflow-x: auto; scrollbar-width: none; }
.tabs::-webkit-scrollbar { display: none; }
.tab {
  flex-shrink: 0; padding: 8px 16px; border-radius: 50px;
  background: var(--surface2); color: var(--text2);
  font-size: 12px; font-weight: 600; letter-spacing: 0.5px;
  border: 1px solid transparent; cursor: pointer; transition: all 0.3s;
  display: flex; align-items: center; gap: 6px;
}
.tab.active {
  background: linear-gradient(135deg, var(--accent), #8b7cf7);
  color: white; box-shadow: 0 3px 16px var(--accent-glow);
}
.tab .tab-delete {
  display: none; width: 16px; height: 16px;
  align-items: center; justify-content: center;
  border-radius: 50%; background: rgba(0,0,0,0.3);
  font-size: 9px; color: white; cursor: pointer;
}
.tab.active .tab-delete { display: flex; }
.tab-add {
  background: transparent; border: 1px dashed var(--text3);
  color: var(--text3); font-size: 16px; padding: 8px 14px;
}

/* Day info */
.day-info {
  display: flex; align-items: center; gap: 6px; padding: 2px 16px 6px;
}
.day-info input {
  background: none; border: none; border-bottom: 1px solid transparent;
  color: var(--text2); font-family: inherit; font-size: 11px;
  letter-spacing: 0.5px; outline: none; padding: 2px 0; width: 110px;
}
.day-info input:focus { border-bottom-color: var(--accent); color: var(--text); }
.day-info .day-actions { display: flex; gap: 4px; margin-left: auto; }
.day-info .btn-sm {
  padding: 3px 8px; border-radius: 6px;
  background: var(--surface2); border: 1px solid rgba(255,255,255,0.06);
  color: var(--text3); font-family: inherit; font-size: 10px; cursor: pointer;
}
.day-info .btn-sm:active { transform: scale(0.95); }

/* Rest config */
.rest-config {
  display: flex; align-items: center; gap: 6px;
  padding: 0 16px 8px; font-size: 11px; color: var(--text3);
}
.rest-config input {
  width: 44px; padding: 3px 4px; border-radius: 6px;
  background: var(--surface2); border: 1px solid rgba(255,255,255,0.06);
  color: var(--accent2); font-family: inherit; font-size: 11px;
  font-weight: 600; text-align: center; outline: none;
}

/* Exercise List */
.exercise-list { padding: 2px 12px; }

.exercise-card {
  background: var(--surface);
  border: 1px solid rgba(255,255,255,0.04);
  border-radius: var(--radius);
  padding: 6px 8px 6px;
  margin-bottom: 4px;
  transition: all 0.3s;
  position: relative; overflow: hidden;
}
.exercise-card::before {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
  background: var(--accent); border-radius: 0 2px 2px 0; opacity: 0.5;
}
.exercise-card.ex-done {
  opacity: 0.5;
}
.exercise-card.ex-done::before { background: var(--green); opacity: 1; }
.exercise-card.active-exercise {
  border-color: var(--accent); box-shadow: 0 0 25px var(--accent-glow);
  opacity: 1;
}
.exercise-card.active-exercise::before { opacity: 1; animation: pulse-bar 1.5s infinite; }
.exercise-card.completed::before { background: var(--green); opacity: 1; }
.exercise-card.dragging { opacity: 0.4; transform: scale(0.96); }
.exercise-card.drag-over { border-color: var(--accent); border-style: dashed; }

@keyframes pulse-bar { 0%,100%{opacity:1} 50%{opacity:0.4} }

/* Layout: flex row with exercise icon */
.exercise-row {
  display: flex; gap: 6px; align-items: center;
}
.exercise-icon {
  flex-shrink: 0; width: 28px; height: 28px; display: flex;
  align-items: center; justify-content: center;
}
.exercise-icon svg { width: 28px; height: 28px; }
.exercise-body { flex: 1; min-width: 0; }

/* Check button */
.btn-check {
  width: 24px; height: 24px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  border-radius: 50%; border: 2px solid var(--text3);
  background: none; color: transparent;
  cursor: pointer; transition: all 0.25s; font-size: 12px;
}
.btn-check:active { transform: scale(0.85); }
.btn-check.checked {
  border-color: var(--green); background: var(--green); color: white;
}

.exercise-content { margin-left: 0; }

.exercise-top {
  display: flex; align-items: center; gap: 4px; flex-wrap: nowrap;
}
.exercise-name {
  font-size: 12px; font-weight: 700; color: var(--text);
  flex: 1; min-width: 0;
}
.exercise-name input {
  background: none; border: none; color: var(--text);
  font: inherit; width: 100%; outline: none; padding: 1px 0;
}
.exercise-name input:focus { border-bottom: 1px solid var(--accent); }
.ex-done .exercise-name input { text-decoration: line-through; color: var(--text3); }

.exercise-actions { display: flex; gap: 3px; flex-shrink: 0; position: relative; }
.exercise-actions .action-btns {
  display: none; gap: 3px; position: absolute; right: 0; top: 100%;
  background: var(--surface2); border: 1px solid rgba(255,255,255,0.08);
  border-radius: 8px; padding: 4px; z-index: 10; margin-top: 2px;
}
.exercise-actions .action-btns.open { display: flex; }
.btn-more {
  width: 24px; height: 24px;
  display: flex; align-items: center; justify-content: center;
  background: none; border: none; border-radius: 6px;
  color: var(--text3); cursor: pointer; font-size: 14px;
  transition: all 0.2s;
}
.btn-more:active { transform: scale(0.9); }
.btn-icon {
  width: 24px; height: 24px;
  display: flex; align-items: center; justify-content: center;
  background: var(--surface3); border: none; border-radius: 6px;
  color: var(--text3); cursor: pointer; font-size: 10px;
  transition: all 0.2s;
}
.btn-icon:active { transform: scale(0.9); }
.btn-icon.btn-up:hover,.btn-icon.btn-down:hover { color: var(--accent2); }
.btn-icon.btn-dup:hover { color: var(--green); }
.btn-icon.btn-del:hover { color: var(--red); }

.exercise-meta {
  display: inline-flex; align-items: center; gap: 4px;
  margin-left: 6px; flex-wrap: wrap;
}
.meta-tag {
  display: flex; align-items: center; gap: 2px;
  background: var(--surface2); padding: 2px 6px;
  border-radius: 5px; font-size: 10px; color: var(--text2);
}
.meta-tag input {
  background: none; border: none; color: var(--accent2);
  font: inherit; font-weight: 600; width: 48px; outline: none;
  text-align: center;
}
.meta-tag .label { color: var(--text3); font-size: 9px; }

/* Sets */
.sets-row {
  display: flex; gap: 3px; margin-top: 4px; flex-wrap: wrap; align-items: center;
}
.set-chip {
  width: 32px; height: 30px;
  display: flex; align-items: center; justify-content: center;
  border-radius: var(--radius-sm);
  background: var(--surface2);
  border: 1px solid rgba(255,255,255,0.06);
  font-size: 12px; font-weight: 700; color: var(--text2);
  cursor: pointer; transition: all 0.2s; position: relative;
}
.set-chip input {
  background: none; border: none; color: inherit;
  font: inherit; font-weight: 700;
  width: 100%; height: 100%; text-align: center; outline: none;
}
.set-chip.done {
  background: rgba(0,184,148,0.15);
  border-color: rgba(0,184,148,0.3); color: var(--green);
}
.set-chip.current {
  background: rgba(108,92,231,0.15);
  border-color: var(--accent); color: white;
  animation: pulse-set 1.5s infinite;
}
@keyframes pulse-set {
  0%,100%{box-shadow:0 0 0 0 var(--accent-glow)}
  50%{box-shadow:0 0 12px 2px var(--accent-glow)}
}
.set-chip .set-remove {
  display: none; position: absolute; top: -5px; right: -5px;
  width: 16px; height: 16px; border-radius: 50%;
  background: var(--red); color: white; font-size: 9px;
  align-items: center; justify-content: center;
  cursor: pointer; z-index: 2; border: 2px solid var(--surface);
}
.sets-editing .set-chip .set-remove { display: flex; }
.sets-editing .set-chip { animation: wiggle 0.3s infinite alternate; }
@keyframes wiggle { from{transform:rotate(-1deg)} to{transform:rotate(1deg)} }

.set-actions { display: flex; gap: 3px; align-items: center; margin-left: 2px; }
.set-btn {
  width: 26px; height: 30px; display: flex; align-items: center; justify-content: center;
  border-radius: var(--radius-sm);
  border: 1px dashed var(--text3); color: var(--text3);
  cursor: pointer; font-size: 14px; background: none;
}
.set-btn:hover { border-color: var(--accent); color: var(--accent); }
.set-btn.set-edit-toggle {
  font-size: 10px; width: auto; padding: 0 6px;
  border-style: solid; border-color: rgba(255,255,255,0.06);
}
.set-btn.set-edit-toggle.active { border-color: var(--red); color: var(--red); background: rgba(225,112,85,0.1); }

.exercise-note {
  font-size: 9px; color: var(--text3); margin-top: 2px; font-style: italic;
}
.exercise-note input {
  background: none; border: none; color: var(--text3);
  font: inherit; font-style: italic; width: 100%; outline: none;
}

/* Workout controls */
.workout-controls {
  position: fixed; bottom: 0; left: 0; right: 0;
  padding: 10px 16px; padding-bottom: max(12px, env(safe-area-inset-bottom));
  background: rgba(10,10,15,0.92);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid rgba(255,255,255,0.05); z-index: 100;
}
.btn-start {
  width: 100%; padding: 14px;
  border: none; border-radius: var(--radius);
  font-family: inherit; font-size: 15px; font-weight: 800;
  letter-spacing: 2px; text-transform: uppercase;
  cursor: pointer; transition: all 0.3s;
  background: linear-gradient(135deg, var(--accent), #8b7cf7);
  color: white; box-shadow: 0 4px 25px var(--accent-glow);
}
.btn-start:active { transform: scale(0.97); }
.btn-start.running {
  background: linear-gradient(135deg, var(--green), #55efc4);
  box-shadow: 0 4px 25px var(--green-glow);
}
.timer-bar {
  display: none; align-items: center; justify-content: space-between;
  margin-bottom: 8px; gap: 10px;
}
.timer-bar.visible { display: flex; }
.timer-display {
  font-size: 28px; font-weight: 900; font-variant-numeric: tabular-nums; color: var(--green);
}
.timer-label { font-size: 9px; color: var(--text3); letter-spacing: 1px; text-transform: uppercase; }

/* Add exercise */
.add-exercise {
  display: flex; align-items: center; justify-content: center; gap: 6px;
  padding: 10px; margin: 4px 12px 8px;
  border: 1px dashed var(--text3); border-radius: var(--radius);
  color: var(--text3); font-size: 12px; font-weight: 500; cursor: pointer;
}
.add-exercise:hover { border-color: var(--accent); color: var(--accent); }

/* Rest overlay */
.rest-overlay {
  display: none; position: fixed; inset: 0; z-index: 150;
  background: rgba(10,10,15,0.95);
  flex-direction: column; align-items: center; justify-content: center;
}
.rest-overlay.visible { display: flex; }
.rest-overlay .rest-label {
  font-size: 13px; color: var(--text3); letter-spacing: 3px; text-transform: uppercase; margin-bottom: 10px;
}
.rest-overlay .rest-next { font-size: 15px; color: var(--text2); margin-top: 18px; }
.rest-overlay .rest-next strong { color: var(--text); }
.rest-skip {
  margin-top: 28px; padding: 12px 36px;
  background: var(--surface2); border: 1px solid var(--text3);
  border-radius: 50px; color: var(--text); font-family: inherit;
  font-size: 13px; font-weight: 600; cursor: pointer;
}
.rest-skip:active { transform: scale(0.95); }
.rest-progress-ring { width: 180px; height: 180px; position: relative; margin-bottom: 6px; }
.rest-progress-ring svg { transform: rotate(-90deg); }
.rest-progress-ring circle { fill: none; stroke-width: 4; }
.rest-progress-ring .bg { stroke: var(--surface2); }
.rest-progress-ring .fg { stroke: var(--orange); stroke-linecap: round; transition: stroke-dashoffset 1s linear; }
.rest-progress-ring .time-text {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 50px; font-weight: 900; color: var(--orange); font-variant-numeric: tabular-nums;
}

/* Modal */
.modal-overlay {
  display: none; position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
  align-items: flex-end; justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--surface); border-radius: 20px 20px 0 0;
  padding: 18px; padding-bottom: max(18px, env(safe-area-inset-bottom));
  width: 100%; max-width: 500px; animation: slide-up 0.25s ease;
}
@keyframes slide-up { from{transform:translateY(100%)} to{transform:translateY(0)} }
.modal-handle { width: 36px; height: 4px; background: var(--text3); border-radius: 2px; margin: 0 auto 14px; opacity: 0.5; }
.modal h3 { font-size: 15px; font-weight: 700; margin-bottom: 12px; }
.modal-option {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 10px; border-radius: var(--radius-sm);
  cursor: pointer; color: var(--text2); font-size: 13px;
}
.modal-option:active { background: var(--surface2); }
.modal-option .mo-icon {
  width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
  border-radius: 8px; background: var(--surface2); font-size: 14px;
}
.modal-option.danger { color: var(--red); }
.modal-option.danger .mo-icon { background: rgba(225,112,85,0.15); }
.modal-sep { height: 1px; background: rgba(255,255,255,0.05); margin: 2px 0; }

::-webkit-scrollbar { width: 0; }
.fade-in { animation: fadeIn 0.25s ease; }
@keyframes fadeIn { from{opacity:0;transform:translateY(8px)} }

.toast {
  position: fixed; bottom: 110px; left: 50%; transform: translateX(-50%);
  background: var(--surface3); color: var(--text); padding: 8px 18px;
  border-radius: 50px; font-size: 12px; font-weight: 500;
  box-shadow: 0 4px 20px rgba(0,0,0,0.4);
  z-index: 300; opacity: 0; transition: opacity 0.3s; pointer-events: none;
}
.toast.show { opacity: 1; }

.empty-state {
  text-align: center; padding: 30px 20px; color: var(--text3);
}
.empty-state .empty-icon { font-size: 36px; margin-bottom: 10px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <h1>BOOM GYM</h1>
    <div class="header-sub">TU RUTINA PERSONALIZADA</div>
  </div>
  <div class="header-right">
    <button class="btn-header" onclick="openSettings()" title="Opciones">⚙</button>
  </div>
</div>

<div class="tabs-container"><div class="tabs" id="tabs"></div></div>
<div class="day-info" id="dayInfo"></div>
<div class="rest-config" id="restConfig"></div>
<div id="exerciseList" class="exercise-list"></div>
<div class="add-exercise" onclick="addExercise()">
  <span style="font-size:18px">+</span> Agregar ejercicio
</div>

<div class="rest-overlay" id="restOverlay">
  <div class="rest-label">DESCANSO</div>
  <div class="rest-progress-ring">
    <svg width="180" height="180" viewBox="0 0 180 180">
      <circle class="bg" cx="90" cy="90" r="80"/>
      <circle class="fg" id="restRingFg" cx="90" cy="90" r="80"
        stroke-dasharray="502.65" stroke-dashoffset="0"/>
    </svg>
    <div class="time-text" id="restTimeDisplay">90</div>
  </div>
  <div class="rest-next" id="restNextExercise">Siguiente: <strong>-</strong></div>
  <button class="rest-skip" onclick="skipRest()">SALTAR DESCANSO</button>
</div>

<div class="modal-overlay" id="settingsModal" onclick="if(event.target===this)closeModal('settingsModal')">
  <div class="modal">
    <div class="modal-handle"></div>
    <h3>Opciones</h3>
    <div class="modal-option" onclick="duplicateDay();closeModal('settingsModal')">
      <div class="mo-icon">📋</div><div>Duplicar día actual</div>
    </div>
    <div class="modal-option" onclick="renameDayPrompt();closeModal('settingsModal')">
      <div class="mo-icon">✏️</div><div>Renombrar día</div>
    </div>
    <div class="modal-sep"></div>
    <div class="modal-option" onclick="exportData();closeModal('settingsModal')">
      <div class="mo-icon">💾</div><div>Exportar rutinas (JSON)</div>
    </div>
    <div class="modal-option" onclick="importData();closeModal('settingsModal')">
      <div class="mo-icon">📂</div><div>Importar rutinas</div>
    </div>
    <div class="modal-sep"></div>
    <div class="modal-option danger" onclick="resetAllData();closeModal('settingsModal')">
      <div class="mo-icon">🗑</div><div>Resetear todo</div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<div class="workout-controls">
  <div class="timer-bar" id="timerBar">
    <div>
      <div class="timer-label" id="timerLabel">TIEMPO TOTAL</div>
      <div class="timer-display" id="timerDisplay">00:00</div>
    </div>
  </div>
  <button class="btn-start" id="btnStart" onclick="toggleWorkout()">EMPEZAR RUTINA</button>
</div>

<input type="file" id="fileInput" accept=".json" style="display:none" onchange="handleImport(event)">

<script>
// ==================== EXERCISE ICON SYSTEM ====================
// Small 28x28 SVGs representing each exercise visually

const EXERCISE_ICONS = {
  // Barbell squat - person squatting with bar
  'sentadilla': `<svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
    <circle cx="14" cy="4" r="2.5" fill="#a0a0b0"/>
    <line x1="4" y1="7" x2="24" y2="7" stroke="#6c5ce7" stroke-width="2" stroke-linecap="round"/>
    <circle cx="3" cy="7" r="2" fill="#6c5ce7" opacity="0.7"/>
    <circle cx="25" cy="7" r="2" fill="#6c5ce7" opacity="0.7"/>
    <path d="M14 7 L14 14 L9 21 M14 14 L19 21" stroke="#a0a0b0" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="11" y1="9" x2="17" y2="9" stroke="#a0a0b0" stroke-width="1.5" stroke-linecap="round"/>
  </svg>`,
  // Barbell row - bent over with bar
  'remo': `<svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
    <circle cx="10" cy="5" r="2.5" fill="#a0a0b0"/>
    <path d="M10 8 L14 16 L10 23" stroke="#a0a0b0" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="14 " y1="16" x2="19" y2="23" stroke="#a0a0b0" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="14" y1="16" x2="8" y2="18" stroke="#a0a0b0" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="4" y1="20" x2="22" y2="20" stroke="#6c5ce7" stroke-width="2" stroke-linecap="round"/>
    <circle cx="3" cy="20" r="2" fill="#6c5ce7" opacity="0.7"/>
    <circle cx="23" cy="20" r="2" fill="#6c5ce7" opacity="0.7"/>
  </svg>`,
  // Bench press - person on bench
  'press plano': `<svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
    <rect x="4" y="16" width="20" height="3" rx="1.5" fill="#3a3a4a"/>
    <circle cx="14" cy="14" r="2.5" fill="#a0a0b0"/>
    <rect x="8" y="15" width="12" height="2" rx="1" fill="#a0a0b0" opacity="0.5"/>
    <line x1="3" y1="8" x2="25" y2="8" stroke="#6c5ce7" stroke-width="2" stroke-linecap="round"/>
    <circle cx="2" cy="8" r="2" fill="#6c5ce7" opacity="0.7"/>

function getExerciseIcon(exerciseName) {
  const name = exerciseName.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
  // Exact match
  for (const [key, svg] of Object.entries(EXERCISE_ICONS)) {
    if (key === '_default') continue;
    const normKey = key.normalize('NFD').replace(/[\u0300-\u036f]/g, '');
    if (name === normKey || name.includes(normKey) || normKey.includes(name)) return svg;
  }
  // Partial match
  for (const [key, svg] of Object.entries(EXERCISE_ICONS)) {
    if (key === '_default') continue;
    const normKey = key.normalize('NFD').replace(/[\u0300-\u036f]/g, '');
    const words = normKey.split(' ');
    if (words.some(w => w.length > 3 && name.includes(w))) return svg;
  }
  return EXERCISE_ICONS['_default'];
}

// ==================== STATE ====================
let data = loadData();
let currentDay = 0;
let workoutActive = false;
let workoutTimer = null;
let workoutSeconds = 0;
let currentExerciseIdx = -1;
let currentSetIdx = -1;
let setsCompleted = [];
let restTimerInterval = null;
let restSeconds = 0;
let editingSetsIdx = -1;
let dragSrcIdx = null;

function loadData() {
  const saved = localStorage.getItem('boom_gym_data');
  if (saved) {
    const d = JSON.parse(saved);
    d.days.forEach(day => {
      if (!day.restTime) day.restTime = 90;
      day.exercises.forEach(ex => { if (ex.done === undefined) ex.done = false; });
    });
    return d;
  }
  return JSON.parse(JSON.stringify(DEFAULT_DATA));
}

function saveData() { localStorage.setItem('boom_gym_data', JSON.stringify(data)); }
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// ==================== RENDER ====================
function renderAll() { renderTabs(); renderDayInfo(); renderExercises(); }

function renderTabs() {
  document.getElementById('tabs').innerHTML = data.days.map((d, i) => `
    <div class="tab ${i === currentDay ? 'active' : ''}" onclick="switchDay(${i})">
      <span>${d.name}</span>
      ${data.days.length > 1 ? `<span class="tab-delete" onclick="event.stopPropagation();removeDay(${i})">✕</span>` : ''}
    </div>
  `).join('') + `<div class="tab tab-add" onclick="addDay()">+</div>`;
}

function renderDayInfo() {
  const day = data.days[currentDay];
  document.getElementById('dayInfo').innerHTML = `

function renderExercises() {

  list.innerHTML = exercises.map((ex, i) => {
    const isActive = workoutActive && i === currentExerciseIdx;
    const isDone = workoutActive && setsCompleted[i] && setsCompleted[i].length > 0 && setsCompleted[i].every(s => s);
    const isEditingSets = editingSetsIdx === i;
    return `
    <div class="exercise-card fade-in ${ex.done ? 'ex-done' : ''} ${isActive ? 'active-exercise' : ''} ${isDone ? 'completed' : ''}"
         style="animation-delay:${i*0.02}s" data-idx="${i}"
         draggable="true" ondragstart="onDragStart(event,${i})" ondragover="onDragOver(event,${i})"
         ondragleave="onDragLeave(event)" ondrop="onDrop(event,${i})" ondragend="onDragEnd(event)">

          <div class="exercise-icon">
            ${getExerciseIcon(ex.name)}
          </div>

                  <span class="label">Peso</span>
                  <input value="${escHtml(ex.weight)}" onchange="updateField(${i},'weight',this.value)" placeholder="—" onfocus="this.select()">

                  <span class="label">×${ex.sets.length}</span>
                </div>
              </div>
              <div class="exercise-actions">
                <button class="btn-more" onclick="toggleActions(event,${i})">⋯</button>
                <div class="action-btns" id="actions-${i}">
                  ${i > 0 ? `<button class="btn-icon btn-up" onclick="moveExercise(${i},-1)">▲</button>` : ''}
                  ${i < exercises.length-1 ? `<button class="btn-icon btn-down" onclick="moveExercise(${i},1)">▼</button>` : ''}
                  <button class="btn-icon btn-dup" onclick="duplicateExercise(${i})">⧉</button>
                  <button class="btn-icon btn-del" onclick="removeExercise(${i})">✕</button>
                </div>
              </div>
            </div>
            <div class="sets-row ${isEditingSets ? 'sets-editing' : ''}">
              ${ex.sets.map((rep, si) => {
                let cls = '';
                if (workoutActive && setsCompleted[i]) {
                  if (setsCompleted[i][si]) cls = 'done';
                  else if (i === currentExerciseIdx && si === currentSetIdx) cls = 'current';
                }
                return `<div class="set-chip ${cls}" onclick="clickSet(${i},${si})">
                  <input value="${rep}" onchange="updateSet(${i},${si},this.value)" onfocus="this.select()" type="number" inputmode="numeric">
                  <span class="set-remove" onclick="event.stopPropagation();removeSet(${i},${si})">✕</span>

function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ==================== DONE TOGGLE ====================
function toggleDone(idx) {
  data.days[currentDay].exercises[idx].done = !data.days[currentDay].exercises[idx].done;
  saveData();
  renderExercises();
}

// ==================== DAY MANAGEMENT ====================
function switchDay(idx) {
  if (workoutActive) { if (!confirm('¿Detener la rutina actual?')) return; stopWorkout(); }
  currentDay = idx; editingSetsIdx = -1; renderAll();
}
function addDay() {
  data.days.push({ name: `DÍA ${data.days.length+1}`, subtitle: '', restTime: 90, exercises: [] });
  saveData(); currentDay = data.days.length - 1; renderAll(); toast('Día agregado');
}
function removeDay(idx) {
  if (data.days.length <= 1) { toast('Mínimo un día'); return; }
  if (!confirm(`¿Eliminar "${data.days[idx].name}"?`)) return;
  data.days.splice(idx, 1);
  if (currentDay >= data.days.length) currentDay = data.days.length - 1;
  saveData(); renderAll(); toast('Día eliminado');
}
function duplicateDay() {
  const copy = JSON.parse(JSON.stringify(data.days[currentDay]));
  copy.name += ' (copia)';
  data.days.splice(currentDay + 1, 0, copy);
  saveData(); currentDay++; renderAll(); toast('Día duplicado');
}
function renameDayPrompt() {
  const name = prompt('Nombre:', data.days[currentDay].name);
  if (name?.trim()) { data.days[currentDay].name = name.trim(); saveData(); renderAll(); }
}

// ==================== EXERCISE MANAGEMENT ====================
function updateField(i, field, value) { data.days[currentDay].exercises[i][field] = value; saveData(); }
function updateSet(i, si, value) { data.days[currentDay].exercises[i].sets[si] = parseInt(value)||0; saveData(); }
function addSet(i) {
  const sets = data.days[currentDay].exercises[i].sets;
  sets.push(sets.length > 0 ? sets[sets.length-1] : 8);
  saveData();
  if (workoutActive && setsCompleted[i]) setsCompleted[i].push(false);
  renderExercises();
}
function removeSet(i, si) {
  data.days[currentDay].exercises[i].sets.splice(si, 1);
  saveData();
  if (workoutActive && setsCompleted[i]) setsCompleted[i].splice(si, 1);
  if (!data.days[currentDay].exercises[i].sets.length) editingSetsIdx = -1;
  renderExercises();
}
function toggleSetsEdit(i) { editingSetsIdx = editingSetsIdx === i ? -1 : i; renderExercises(); }

function toggleActions(e, idx) {
  e.stopPropagation();
  const menu = document.getElementById('actions-' + idx);
  const isOpen = menu.classList.contains('open');
  // Close all open menus first
  document.querySelectorAll('.action-btns.open').forEach(m => m.classList.remove('open'));
  if (!isOpen) menu.classList.add('open');
}
// Close action menus when clicking elsewhere
document.addEventListener('click', () => {
  document.querySelectorAll('.action-btns.open').forEach(m => m.classList.remove('open'));
});

function addExercise() {
  data.days[currentDay].exercises.push({ name: 'Nuevo ejercicio', weight: '', sets: [8,8,8], note: '', done: false });
  saveData();
  if (workoutActive) setsCompleted.push(new Array(3).fill(false));
  renderExercises();
  setTimeout(() => { const inputs = document.querySelectorAll('.exercise-name input'); if (inputs.length) inputs[inputs.length-1].focus(); }, 100);
}
function removeExercise(idx) {
  if (!confirm(`¿Eliminar "${data.days[currentDay].exercises[idx].name}"?`)) return;
  data.days[currentDay].exercises.splice(idx, 1); saveData();
  if (workoutActive) { setsCompleted.splice(idx, 1); if (currentExerciseIdx >= data.days[currentDay].exercises.length) currentExerciseIdx = Math.max(0, data.days[currentDay].exercises.length-1); }
  editingSetsIdx = -1; renderExercises();
}
function duplicateExercise(idx) {
  const copy = JSON.parse(JSON.stringify(data.days[currentDay].exercises[idx]));
  copy.name += ' (copia)'; copy.done = false;
  data.days[currentDay].exercises.splice(idx+1, 0, copy); saveData();
  if (workoutActive) setsCompleted.splice(idx+1, 0, new Array(copy.sets.length).fill(false));
  renderExercises();
}
function moveExercise(idx, dir) {
  const ni = idx + dir, exs = data.days[currentDay].exercises;
  if (ni < 0 || ni >= exs.length) return;
  [exs[idx], exs[ni]] = [exs[ni], exs[idx]];
  if (workoutActive) {
    [setsCompleted[idx], setsCompleted[ni]] = [setsCompleted[ni], setsCompleted[idx]];
    if (currentExerciseIdx === idx) currentExerciseIdx = ni;
    else if (currentExerciseIdx === ni) currentExerciseIdx = idx;
  }
  saveData(); editingSetsIdx = -1; renderExercises();
}

// ==================== DRAG & DROP ====================
function onDragStart(e, idx) { dragSrcIdx = idx; e.target.closest('.exercise-card').classList.add('dragging'); e.dataTransfer.effectAllowed = 'move'; }
function onDragOver(e, idx) { e.preventDefault(); if (idx !== dragSrcIdx) { document.querySelectorAll('.exercise-card').forEach(c => c.classList.remove('drag-over')); e.target.closest('.exercise-card')?.classList.add('drag-over'); } }
function onDragLeave(e) { e.target.closest('.exercise-card')?.classList.remove('drag-over'); }
function onDrop(e, idx) {
  e.preventDefault(); document.querySelectorAll('.exercise-card').forEach(c => c.classList.remove('drag-over','dragging'));
  if (dragSrcIdx === null || dragSrcIdx === idx) return;
  const exs = data.days[currentDay].exercises, [moved] = exs.splice(dragSrcIdx, 1); exs.splice(idx, 0, moved);
  if (workoutActive) { const [ms] = setsCompleted.splice(dragSrcIdx, 1); setsCompleted.splice(idx, 0, ms); }
  saveData(); dragSrcIdx = null; renderExercises();
}
function onDragEnd() { document.querySelectorAll('.exercise-card').forEach(c => c.classList.remove('drag-over','dragging')); dragSrcIdx = null; }

// ==================== WORKOUT MODE ====================
function toggleWorkout() { workoutActive ? (confirm('¿Finalizar?') && stopWorkout()) : startWorkout(); }

function startWorkout() {
  const exs = data.days[currentDay].exercises;
  if (!exs.length) { toast('Agregá ejercicios primero'); return; }
  // Reset done states
  exs.forEach(ex => ex.done = false); saveData();
  workoutActive = true; workoutSeconds = 0;
  setsCompleted = exs.map(ex => new Array(ex.sets.length).fill(false));
  currentExerciseIdx = findNextIncompleteExercise(0); currentSetIdx = 0;
  document.getElementById('btnStart').textContent = 'FINALIZAR RUTINA';
  document.getElementById('btnStart').classList.add('running');
  document.getElementById('timerBar').classList.add('visible');
  workoutTimer = setInterval(() => { workoutSeconds++; updateTimerDisplay(); }, 1000);
  renderExercises();
  if (currentExerciseIdx >= 0) scrollToExercise(currentExerciseIdx);
  toast('Rutina iniciada');
}

function stopWorkout() {
  workoutActive = false; clearInterval(workoutTimer); clearInterval(restTimerInterval);
  document.getElementById('btnStart').textContent = 'EMPEZAR RUTINA';
  document.getElementById('btnStart').classList.remove('running');
  document.getElementById('timerBar').classList.remove('visible');
  document.getElementById('restOverlay').classList.remove('visible');
  currentExerciseIdx = -1; currentSetIdx = -1; editingSetsIdx = -1;
  renderExercises(); toast(`Rutina: ${formatTime(workoutSeconds)}`);
}

function formatTime(s) { return `${Math.floor(s/60)}m ${(s%60).toString().padStart(2,'0')}s`; }
function updateTimerDisplay() {
  const m = Math.floor(workoutSeconds/60).toString().padStart(2,'0');
  const s = (workoutSeconds%60).toString().padStart(2,'0');
  document.getElementById('timerDisplay').textContent = `${m}:${s}`;
}

function clickSet(ei, si) {
  if (!workoutActive) return;
  setsCompleted[ei][si] = !setsCompleted[ei][si];
  if (setsCompleted[ei].every(s => s)) {
    // Mark exercise as done
    data.days[currentDay].exercises[ei].done = true; saveData();
    const next = findNextIncompleteExercise(ei + 1);
    if (next !== -1) { startRest(next); }
    else {
      const any = findNextIncompleteExercise(0);
      if (any === -1) { currentExerciseIdx = -1; currentSetIdx = -1; document.getElementById('btnStart').textContent = '✓ COMPLETA'; }
      else { currentExerciseIdx = any; currentSetIdx = setsCompleted[any]?.findIndex(s => !s) ?? 0; }
    }
  } else {
    data.days[currentDay].exercises[ei].done = false; saveData();
    currentExerciseIdx = ei; currentSetIdx = setsCompleted[ei].findIndex(s => !s);
  }
  renderExercises();
}

function findNextIncompleteExercise(from) {
  const exs = data.days[currentDay].exercises;
  for (let i = from; i < exs.length; i++) { if (!exs[i].sets.length) continue; if (!setsCompleted[i] || !setsCompleted[i].every(s => s)) return i; }
  return -1;
}

function startRest(nextIdx) {
  const rt = data.days[currentDay].restTime || 90;
  restSeconds = rt;
  const overlay = document.getElementById('restOverlay');
  document.getElementById('restNextExercise').innerHTML = `Siguiente: <strong>${data.days[currentDay].exercises[nextIdx]?.name||'-'}</strong>`;
  document.getElementById('restTimeDisplay').textContent = restSeconds;
  overlay.classList.add('visible');
  const circ = 2 * Math.PI * 80;
  const ring = document.getElementById('restRingFg');
  ring.style.strokeDashoffset = '0';
  clearInterval(restTimerInterval);
  restTimerInterval = setInterval(() => {
    restSeconds--;
    document.getElementById('restTimeDisplay').textContent = restSeconds;
    ring.style.strokeDashoffset = circ * (1 - restSeconds / rt);
    if (restSeconds <= 0) {
      clearInterval(restTimerInterval); overlay.classList.remove('visible');
      currentExerciseIdx = nextIdx; currentSetIdx = setsCompleted[nextIdx]?.findIndex(s => !s) ?? 0;
      renderExercises(); scrollToExercise(nextIdx);
    }
  }, 1000);
}

function skipRest() {
  clearInterval(restTimerInterval); document.getElementById('restOverlay').classList.remove('visible');
  const next = findNextIncompleteExercise(currentExerciseIdx + 1);
  if (next !== -1) { currentExerciseIdx = next; currentSetIdx = setsCompleted[next]?.findIndex(s => !s) ?? 0; }
  else { const any = findNextIncompleteExercise(0); if (any !== -1) { currentExerciseIdx = any; currentSetIdx = setsCompleted[any]?.findIndex(s => !s) ?? 0; } }
  renderExercises(); if (currentExerciseIdx >= 0) scrollToExercise(currentExerciseIdx);
}

function scrollToExercise(idx) {
  setTimeout(() => { const cards = document.querySelectorAll('.exercise-card'); cards[idx]?.scrollIntoView({ behavior: 'smooth', block: 'center' }); }, 100);
}

// ==================== SETTINGS ====================
function openSettings() { document.getElementById('settingsModal').classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function exportData() {
  const blob = new Blob([JSON.stringify(data,null,2)], {type:'application/json'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = 'boom_gym_backup.json'; a.click(); URL.revokeObjectURL(a.href); toast('Exportado');
}
function importData() { document.getElementById('fileInput').click(); }
function handleImport(event) {
  const f = event.target.files[0]; if (!f) return;
  const r = new FileReader();
  r.onload = (e) => {
    try {
      const d = JSON.parse(e.target.result);
      if (d.days && Array.isArray(d.days)) {
        data = d; data.days.forEach(day => { if (!day.restTime) day.restTime = 90; day.exercises.forEach(ex => { if (ex.done === undefined) ex.done = false; }); });
        saveData(); currentDay = 0; renderAll(); toast('Importado');
      } else toast('Formato inválido');
    } catch { toast('Error al leer'); }
  };
  r.readAsText(f); event.target.value = '';
}
function resetAllData() {
  if (!confirm('¿Resetear TODAS las rutinas?')) return;
  data = JSON.parse(JSON.stringify(DEFAULT_DATA));
  saveData(); currentDay = 0; renderAll(); toast('Reseteado');
}

// ==================== INIT ====================
renderAll();
</script>
